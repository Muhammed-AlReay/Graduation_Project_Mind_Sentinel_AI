services:
  project12:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project12-ai-service
    ports:
      - "${PROJECT12_PORT:-8100}:8100"
    env_file:
      - .env
    environment:
      PROJECT12_BASE_DIR: /app
      PROJECT12_API_KEY: "${PROJECT12_API_KEY:?PROJECT12_API_KEY is required}"
      PROJECT12_AUTH_ENABLED: "${PROJECT12_AUTH_ENABLED:-true}"
      PROJECT12_AUTO_INGEST: "${PROJECT12_AUTO_INGEST:-true}"
      PROJECT12_HOST: "0.0.0.0"
      PROJECT12_PORT: "8100"
      PROJECT12_LOG_LEVEL: "${PROJECT12_LOG_LEVEL:-INFO}"
      PROJECT12_LLM_TIMEOUT_SECONDS: "${PROJECT12_LLM_TIMEOUT_SECONDS:-30}"
      PROJECT12_MAX_REQUEST_BYTES: "${PROJECT12_MAX_REQUEST_BYTES:-65536}"
      PROJECT12_RATE_LIMIT_CHAT: "${PROJECT12_RATE_LIMIT_CHAT:-20}"
      PROJECT12_RATE_LIMIT_CRISIS: "${PROJECT12_RATE_LIMIT_CRISIS:-40}"
      PROJECT12_RATE_LIMIT_MEMORY: "${PROJECT12_RATE_LIMIT_MEMORY:-60}"
    volumes:
      - project12_vectorstore:/app/vectorstore
      - project12_memory:/app/memory_data
      - project12_hf_cache:/app/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  project12_vectorstore:
  project12_memory:
  project12_hf_cache:
